<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THSR Business App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .page { display: none; }
    .active { display: block; }
  </style>
</head>
<body class="bg-orange-50 font-sans">

<div class="max-w-md mx-auto min-h-screen p-5">

  <!-- HOME PAGE -->
  <div id="home" class="page active">

    <div class="bg-white rounded-3xl shadow-lg p-6 mb-5 border border-orange-100">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold text-orange-600">THSR Business</h1>
          <p class="text-gray-500 mt-1">Taiwan High Speed Rail</p>
        </div>

        <div class="bg-orange-500 text-white px-4 py-2 rounded-2xl text-sm font-semibold">
          VIP Member
        </div>
      </div>
    </div>

    <div class="bg-gradient-to-r from-orange-500 to-orange-400 rounded-3xl p-6 text-white shadow-xl mb-5">
      <div class="flex justify-between items-start">
        <div>
          <p class="text-orange-100 text-sm">Upcoming Trip</p>
          <h2 class="text-3xl font-bold mt-2">左營 → 台北</h2>
          <p class="mt-2 text-orange-100">2026/05/19 ・ 18:30</p>
        </div>

        <div class="bg-white/20 px-3 py-2 rounded-xl text-sm">
          6車 12A
        </div>
      </div>

      <button onclick="showPage('ticket')" class="w-full bg-white text-orange-600 font-bold mt-6 py-4 rounded-2xl hover:bg-orange-100 transition">
        查看電子車票
      </button>
    </div>

    <div class="grid grid-cols-2 gap-4">

      <button onclick="showPage('booking')" class="bg-white rounded-3xl shadow p-5 border border-orange-100 hover:scale-105 transition text-left">
        <div class="text-4xl">🎫</div>
        <h3 class="font-bold text-lg mt-3">Book Ticket</h3>
        <p class="text-sm text-gray-500 mt-1">快速訂票服務</p>
      </button>

      <button onclick="showPage('train')" class="bg-white rounded-3xl shadow p-5 border border-orange-100 hover:scale-105 transition text-left">
        <div class="text-4xl">🚄</div>
        <h3 class="font-bold text-lg mt-3">Train Status</h3>
        <p class="text-sm text-gray-500 mt-1">即時列車資訊</p>
      </button>

      <button onclick="showPage('station')" class="bg-white rounded-3xl shadow p-5 border border-orange-100 hover:scale-105 transition text-left">
        <div class="text-4xl">📍</div>
        <h3 class="font-bold text-lg mt-3">Station Info</h3>
        <p class="text-sm text-gray-500 mt-1">車站資訊導覽</p>
      </button>

      <button onclick="alert('目前沒有新通知')" class="bg-white rounded-3xl shadow p-5 border border-orange-100 hover:scale-105 transition text-left">
        <div class="text-4xl">🔔</div>
        <h3 class="font-bold text-lg mt-3">Notifications</h3>
        <p class="text-sm text-gray-500 mt-1">延誤與通知</p>
      </button>

    </div>

  </div>

  <!-- BOOKING PAGE -->
  <div id="booking" class="page">
    <div class="bg-white rounded-3xl p-6 shadow-lg">
      <h2 class="text-3xl font-bold text-orange-600 mb-5">訂票系統</h2>

      <div class="space-y-4">

        <div>
          <label class="text-sm text-gray-500">起點站</label>
          <select class="w-full mt-1 border rounded-2xl px-4 py-3">
            <option>左營站</option>
            <option>台中站</option>
            <option>台北站</option>
          </select>
        </div>

        <div>
          <label class="text-sm text-gray-500">終點站</label>
          <select class="w-full mt-1 border rounded-2xl px-4 py-3">
            <option>台北站</option>
            <option>台中站</option>
            <option>左營站</option>
          </select>
        </div>

        <div>
          <label class="text-sm text-gray-500">日期</label>
          <input type="date" class="w-full mt-1 border rounded-2xl px-4 py-3">
        </div>

        <button onclick="showPage('train')" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold hover:bg-orange-600 transition">
          搜尋車次
        </button>

      </div>

      <button onclick="showPage('home')" class="mt-5 w-full border border-orange-500 text-orange-500 py-3 rounded-2xl">
        返回首頁
      </button>
    </div>
  </div>

  <!-- TRAIN PAGE -->
  <div id="train" class="page">
    <div class="bg-white rounded-3xl p-6 shadow-lg">
      <h2 class="text-3xl font-bold text-orange-600 mb-5">列車資訊</h2>

      <div class="space-y-4">

        <div class="border rounded-2xl p-4">
          <div class="flex justify-between">
            <div>
              <h3 class="font-bold text-lg">0832 車次</h3>
              <p class="text-gray-500">左營 → 台北</p>
            </div>
            <div class="text-right">
              <p class="font-bold text-orange-600">18:30</p>
              <p class="text-green-500 text-sm">準點</p>
            </div>
          </div>
        </div>

        <div class="border rounded-2xl p-4">
          <div class="flex justify-between">
            <div>
              <h3 class="font-bold text-lg">0840 車次</h3>
              <p class="text-gray-500">左營 → 台北</p>
            </div>
            <div class="text-right">
              <p class="font-bold text-orange-600">19:00</p>
              <p class="text-red-500 text-sm">延誤5分</p>
            </div>
          </div>
        </div>

      </div>

      <button onclick="showPage('home')" class="mt-5 w-full border border-orange-500 text-orange-500 py-3 rounded-2xl">
        返回首頁
      </button>
    </div>
  </div>

  <!-- TICKET PAGE -->
  <div id="ticket" class="page">
    <div class="bg-gradient-to-r from-orange-500 to-orange-400 rounded-3xl p-6 text-white shadow-xl">
      <h2 class="text-3xl font-bold">電子車票</h2>

      <div class="mt-5 bg-white text-black rounded-3xl p-5 text-center">
        <div class="w-48 h-48 mx-auto bg-gray-200 rounded-2xl flex items-center justify-center text-gray-500">
          QR CODE
        </div>

        <h3 class="font-bold text-2xl mt-5">左營 → 台北</h3>
        <p class="text-gray-500 mt-2">6車 12A</p>
        <p class="text-gray-500">2026/05/19 18:30</p>
      </div>

      <button onclick="showPage('home')" class="mt-5 w-full bg-white text-orange-600 py-4 rounded-2xl font-bold">
        返回首頁
      </button>
    </div>
  </div>

  <!-- STATION PAGE -->
  <div id="station" class="page">
    <div class="bg-white rounded-3xl p-6 shadow-lg">
      <h2 class="text-3xl font-bold text-orange-600 mb-5">車站資訊</h2>

      <div class="space-y-4">

        <div class="border rounded-2xl p-4">
          <h3 class="font-bold text-lg">左營站</h3>
          <p class="text-gray-500 mt-1">停車場、接駁車、美食街</p>
        </div>

        <div class="border rounded-2xl p-4">
          <h3 class="font-bold text-lg">台中站</h3>
          <p class="text-gray-500 mt-1">轉乘台鐵、公車資訊</p>
        </div>

        <div class="border rounded-2xl p-4">
          <h3 class="font-bold text-lg">台北站</h3>
          <p class="text-gray-500 mt-1">捷運出口、商場資訊</p>
        </div>

      </div>

      <button onclick="showPage('home')" class="mt-5 w-full border border-orange-500 text-orange-500 py-3 rounded-2xl">
        返回首頁
      </button>
    </div>
  </div>

</div>

<script>
  function showPage(pageId) {
    const pages = document.querySelectorAll('.page');
    pages.forEach(page => page.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
  }
</script>

</body>
</html>
